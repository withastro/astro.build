name: Format main branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.repository_owner == 'withastro'
    uses: withastro/automation/.github/workflows/format.yml@ae6aef024c102af4baa4aadadf3fa1f4d0b997e5 # main
    with:
      command: "format"
    secrets: inherit
