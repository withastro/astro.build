name: Format main branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.repository_owner == 'withastro'
    uses: withastro/automation/.github/workflows/format.yml@4d31eae2df2bbf991c50664b1aa21b60ca8299ed # main
    with:
      command: "format"
    secrets: inherit
