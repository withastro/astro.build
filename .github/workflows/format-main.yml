name: Format main branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.repository_owner == 'withastro'
    uses: withastro/automation/.github/workflows/format.yml@fc0f1c3adade217eeaa4257defedb23bc5f4dd87 # v1.1.1
    with:
      command: "format"
    secrets: inherit
