autoInstallPeers: true

patchedDependencies:
  astro: patches/astro.patch

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  puppeteer: false
  sharp: false

# Require dependencies to be at least 3 days old before allowing them to be installed.
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  # Astro v7 beta packages are too new for the 3-day policy
  - 'astro'
  - '@astrojs/*'
  # Transitive dependencies pulled in by astro v7
  - 'nanoid'
  - 'satteri'
  - '@bruits/*'
